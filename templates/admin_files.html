<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة ملفات البوت - 𝑳𝟗𝑩𝑰𝟕𝑬 𝑶𝑭𝑭𝑰𝑪𝑰𝑬𝑳</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .editor-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            height: calc(100vh - 150px);
        }
        .file-list {
            background: var(--card);
            border-radius: 15px;
            padding: 15px;
            overflow-y: auto;
            border: 1px solid var(--border);
        }
        .file-item {
            padding: 10px;
            cursor: pointer;
            border-radius: 5px;
            margin-bottom: 5px;
            transition: 0.3s;
            color: var(--text-dim);
        }
        .file-item:hover {
            background: var(--card-hover);
            color: var(--primary);
        }
        .file-item.active {
            background: var(--primary);
            color: var(--dark);
        }
        .editor-area {
            background: var(--card);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
        }
        textarea {
            flex: 1;
            background: #111;
            color: #0f0;
            font-family: 'Courier New', monospace;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--border);
            resize: none;
            font-size: 14px;
            line-height: 1.5;
        }
        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        @media (max-width: 768px) {
            .editor-container {
                grid-template-columns: 1fr;
            }
            .file-list {
                height: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <a href="/dashboard" class="menu-item"><i class="fas fa-home"></i><span>الرئيسية</span></a>
        <a href="/admin" class="menu-item"><i class="fas fa-users-cog"></i><span>المستخدمين</span></a>
        <a href="/admin/files" class="menu-item active"><i class="fas fa-file-code"></i><span>الملفات</span></a>
        <a href="/logout" class="menu-item"><i class="fas fa-sign-out-alt"></i><span>خروج</span></a>
    </div>

    <div class="container">
        <div class="header">
            <h1><i class="fas fa-file-code"></i> إدارة ملفات البوت</h1>
            <p>يمكنك تعديل ملفات السورس مباشرة من هنا</p>
        </div>

        <div class="editor-container">
            <div class="file-list">
                <h3>قائمة الملفات</h3>
                {% for file in files %}
                <div class="file-item" onclick="loadFile('{{ file }}', this)">
                    <i class="fas fa-file"></i> {{ file }}
                </div>
                {% endfor %}
            </div>
            
            <div class="editor-area">
                <div class="editor-header">
                    <h3 id="current-file">اختر ملفاً للتعديل</h3>
                    <button class="btn-login" style="width: auto; padding: 10px 30px;" onclick="saveFile()">
                        <i class="fas fa-save"></i> حفظ التغييرات
                    </button>
                </div>
                <textarea id="file-content" spellcheck="false" placeholder="محتوى الملف سيظهر هنا..."></textarea>
            </div>
        </div>
    </div>

    <script>
        let currentFilePath = '';

        async function loadFile(path, element) {
            currentFilePath = path;
            document.getElementById('current-file').innerText = 'جاري التحميل: ' + path;
            
            document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            try {
                const response = await fetch('/admin/files/read', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({path: path})
                });
                const data = await response.json();
                if(data.success) {
                    document.getElementById('file-content').value = data.content;
                    document.getElementById('current-file').innerText = 'تعديل: ' + path;
                } else {
                    alert('خطأ: ' + data.error);
                }
            } catch(e) {
                alert('فشل الاتصال بالخادم');
            }
        }

        async function saveFile() {
            if(!currentFilePath) return alert('يرجى اختيار ملف أولاً');
            
            const content = document.getElementById('file-content').value;
            
            try {
                const response = await fetch('/admin/files/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({path: currentFilePath, content: content})
                });
                const data = await response.json();
                if(data.success) {
                    alert('✅ تم حفظ الملف بنجاح');
                } else {
                    alert('❌ خطأ في الحفظ: ' + data.error);
                }
            } catch(e) {
                alert('فشل الاتصال بالخادم');
            }
        }
    </script>
</body>
</html>
